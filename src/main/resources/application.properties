server.port=8080

# 腾讯地图API Key
tencent.map.key=PYUBZ-EC2EH-YUJD6-WF7OL-ID6XF-IABZ2

tencent.map.js-key=PYUBZ-EC2EH-YUJD6-WF7OL-ID6XF-IABZ2

# 腾讯地图api域名
tencent.map.api-domain=https://apis.map.qq.com/

# 腾讯地图域名
tencent.map.domain=https://map.qq.com/


# 数据库配置
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:D:/eaglesystem/db.sqlite3
spring.datasource.username=
spring.datasource.password=

# 添加HikariCP连接池配置（提升数据库性能）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# MyBatis配置
# 指定XML映射文件位置
mybatis.mapper-locations=classpath:mapper/*.xml
# 开启驼峰命名转换，createTime字段自动映射create_time
mybatis.configuration.map-underscore-to-camel-case=true
# 开启SQL日志输出到控制台
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# 注册自定义TypeHandler包（处理GBase JDBC返回的百分比字符串）
mybatis.type-handlers-package=com.example.demo.handler

# 经纬度外部接口（内网环境提供）
querybo.url=http://your-querybo-url.com/queryBo
# QUERYBOURL=http://64.1.30.234:8901/api/app/location/share/queryBo
# 定时任务Cron表达式（默认每10分钟）
querybo.cron=0 0/10 * * * ?
# 是否插入数据库（true=插入，false=仅打印日志不插入）
querybo.insert-enabled=false

# 经纬度同步总开关（true=开启定时任务，false=关闭）
locationsync.enabled=false

# Heatmap anomaly detection (2026-06 upgrade: P95 + grid merge + dominant ratio)
# grid cell size in degrees
heatmap.region.step-deg=0.005
# cross-cell merge distance in degrees (cluster nearby candidates)
heatmap.region.merge-dist-deg=0.003
# P95 threshold floor (sparse days won't trigger with too-low P95)
heatmap.region.p95-min=5
# merged-cluster count / global total ratio to mark as stat
heatmap.region.dominant-ratio=0.20
# max top-K actionable regions per day
heatmap.region.k-max=8

# @deprecated 旧 median+MAD 参数，新算法不读取；保留以避免环境变量覆盖时启动失败
heatmap.region.sigma=1.3
heatmap.region.watch-sigma=1.0
heatmap.region.k-min=1
heatmap.region.use-robust=true
heatmap.region.dispersion-eps=1e-6

# ============= Heatmap algorithm selection =============
# 3-way switch: p95 (current prod) | legacy (median+MAD, deprecated) | cascade (v3)
heatmap.algorithm.mode=cascade

# ============= Cascade parameters =============
# Step 1 floor (per-region count >= max(this, P95) becomes a candidate)
heatmap.cascade.p95-min=5
# Step 1 & Step 2 dominant-ratio threshold (cluster_count / 4-neighbor_total)
heatmap.cascade.dominant-ratio=0.4
# Step 1 & Step 2 merge radius for aggregating candidates into a cluster (degrees)
heatmap.cascade.merge-dist-deg=0.003
# Step 3 top-K fallback size (yellow markers)
heatmap.cascade.k-max=8
